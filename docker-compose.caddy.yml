services:
  caddy:
    image: caddy:2-alpine
    container_name: ticketera-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

name: ticketera

services:
  app:
    image: ticketera-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketera-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health/auth >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_CONFIG_ENCRYPTION_KEY: ${APP_CONFIG_ENCRYPTION_KEY}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      SQLITE_DATABASE_URL: ${SQLITE_DATABASE_URL:-file:/app/data/ticketera.db}
      POSTGRES_DATABASE_URL: ${POSTGRES_DATABASE_URL:-postgresql://ticketera:ticketera_local_password@localhost:5432/ticketera?schema=public}
    ports:
      - "${APP_PORT:-3000}:3000"
    expose:
      - "3000"
    volumes:
      - ticketera_sqlite_data:/app/data

volumes:
  ticketera_sqlite_data:

name: ticketera

services:
  app:
    image: ticketera-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketera-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4217}:4217"
    volumes:
      - ticketera_sqlite_data:/app/data

volumes:
  ticketera_sqlite_data:

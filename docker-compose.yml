name: ticketera

services:
  caddy:
    image: caddy:2-alpine
    container_name: ticketera-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  db:
    image: postgres:16-alpine
    container_name: ticketera-db
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketera}
      POSTGRES_USER: ${POSTGRES_USER:-ticketera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketera_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ticketera_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketera} -d ${POSTGRES_DB:-ticketera}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ticketera-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketera-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health/auth >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      SQLITE_DATABASE_URL: ${SQLITE_DATABASE_URL:-file:/app/data/ticketera.db}
      POSTGRES_DATABASE_URL: ${POSTGRES_DATABASE_URL:-postgresql://ticketera:ticketera_local_password@db:5432/ticketera?schema=public}
      ATERA_API_KEY: ${ATERA_API_KEY}
      ATERA_API_BASE: ${ATERA_API_BASE:-https://app.atera.com/api/v3}
      ATERA_TECHNICIAN_ID: ${ATERA_TECHNICIAN_ID:-}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@local}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      AUTH_BOOTSTRAP_ADMIN_FIRST_NAME: ${AUTH_BOOTSTRAP_ADMIN_FIRST_NAME:-System}
      AUTH_BOOTSTRAP_ADMIN_LAST_NAME: ${AUTH_BOOTSTRAP_ADMIN_LAST_NAME:-Administrator}
      AUTH_BOOTSTRAP_ADMIN_EMPLOYEE_ID: ${AUTH_BOOTSTRAP_ADMIN_EMPLOYEE_ID:-ADMIN-0001}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      AUTH_MAX_FAILED_LOGIN_ATTEMPTS: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      AUTH_LOCKOUT_MINUTES: ${AUTH_LOCKOUT_MINUTES:-15}
    expose:
      - "3000"
    volumes:
      - ticketera_sqlite_data:/app/data

volumes:
  caddy_data:
  caddy_config:
  ticketera_postgres_data:
  ticketera_sqlite_data:
